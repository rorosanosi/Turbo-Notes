<body>
<style> body{
  position: relative;
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: cover;
  background-position: center;
  background-image: url('pixil-frame-0-3.png');
  background-size: 100% 100%;

}
</style>
    <ul class="nav-list">

    <div class = "middlebox">
    <h1>Settings</h1>
    <h2>Adjust for your preference</h2>
    <h3>Light/dark mode</h3>
    <label class="switch">
        <input type="checkbox" id="modeToggle" onclick="myFunction()">
        <span class="slider round"></span>
    </label>
    <h3>Text to speech</h3>
    <label class="switch">
        <input type="checkbox" id="modeToggle" onclick="myFunction()">
        <span class="slider round"></span>
    </label>
    <h3>Hands free</h3>
    <label class="switch">
        <input type="checkbox" id="modeToggle" onclick="myFunction()">
        <span class="slider round"></span>
    </label>
    </div>

    <script>
        function myFunction() {
            let element = document.body;
            element.classList.toggle("dark");
        }
    </script>
