<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Home</title>
</head>
<body>
    <ul class="nav-list">
        <li><a href="index.html">Home</a></li>
    </ul>

    <div class="container">
        <h1>My Flashcard Decks</h1>
        <div class="container2">
        <button id="deckthingybutton" onclick="openDeckPage">
            <img src="/Users/daisylee/Hackathon 2026/pixil-frame-0-5.png" alt="Italian Trulli" width = "100" height="100">
        </button>
        </div>
        <div id="deckContainer" class="deck-grid">
            <div class="deck-card add-deck-btn" id="createNewDeck">
                <div class="icon">➕</div>
                <span>New Deck</span>
            </div>
        </div>

        <hr> <div id="generatorSection" style="display:none;">
            <h2 id="activeDeckTitle">Upload to Deck</h2>
            <label>Upload Revision Notes (PDF only)</label>
            <input type="file" id="notes" name="notes" accept=".pdf" />
            <button id="generateBtn">Generate Flashcards</button>
        </div>

        <div id="cardGrid" class="card-grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
