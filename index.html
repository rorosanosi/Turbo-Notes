<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>StudyDash - Home</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('pixil-frame-0-3.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: "Pixelify Sans", sans-serif;
        }

        .home-container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 50px;
            border: 4px solid #333;
            border-radius: 15px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            color: #333;
        }

        .icon-grid {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .icon-card {
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
            width: 120px;
        }

        .icon-card:hover {
            transform: translateY(-10px);
        }

        .custom-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .icon-card span {
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="home-container">
        <h1>Study Dashboard</h1>
        
        <div class="icon-grid">
            <a href="createnew.html" class="icon-card">
                <img src="create-icon.png" alt="Create" class="custom-icon">
                <span>Create New</span>
            </a>

            <a href="flashcards.html" class="icon-card">
                <img src="view-icon.png" alt="View" class="custom-icon">
                <span>View Decks</span>
            </a>

            <a href="settings.html" class="icon-card">
                <img src="settings-icon.png" alt="Settings" class="custom-icon">
                <span>Settings</span>
            </a>
        </div>
    </div>

</body>
</html>
